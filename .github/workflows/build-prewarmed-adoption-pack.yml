name: Build prewarmed adoption controller pack
on:
  pull_request:
    branches: ["research/certa-active-v1"]
    paths:
      - "CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK/**"
      - ".github/workflows/build-prewarmed-adoption-pack.yml"
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate checksums and validate
        shell: bash
        run: |
          set -euo pipefail
          PACK=CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK
          chmod +x "$PACK/RUNTIME_CONTROLLER_ADOPT.py" "$PACK/validate_pack.py"
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          root=Path('CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK')
          rows=[]
          for p in sorted(root.rglob('*')):
              if p.is_file() and p.name != 'SHA256SUMS.txt':
                  rows.append(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.relative_to(root)}")
          (root/'SHA256SUMS.txt').write_text('\n'.join(rows)+'\n', encoding='utf-8')
          PY
          python3 "$PACK/validate_pack.py" --pack-root "$PACK"
          zip -qr "${PACK}.zip" "$PACK"
          sha256sum "${PACK}.zip" > "${PACK}_ZIP_SHA256.txt"
      - name: Upload validated pack
        uses: actions/upload-artifact@v4
        with:
          name: CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK
          path: |
            CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK.zip
            CERTA_ACTIVE_V1_PREWARMED_SERVICE_ADOPTION_CONTROLLER_PACK_ZIP_SHA256.txt
          if-no-files-found: error
          retention-days: 30
